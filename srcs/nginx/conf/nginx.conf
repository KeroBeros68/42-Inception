# =============================================================
# Nginx main configuration for a WordPress site behind PHP-FPM,
# terminating TLS at nginx.
# =============================================================

# System user nginx worker processes run as (lower privilege than root,
# used for security isolation).
user nginx;

# Number of worker processes handling requests.
# "auto" tells nginx to spawn one worker per available CPU core.
worker_processes auto;

# File where nginx stores its master process PID.
# Used by service managers (systemd, init scripts) to control nginx.
pid /run/nginx.pid;

# Connection-handling settings (applies to all workers).
events {
    # Max simultaneous connections a single worker process can handle.
    worker_connections 1024;
}

# HTTP/HTTPS-level configuration block (contains all server blocks).
http {
    # Loads the file mapping file extensions to MIME types
    # (e.g. .css -> text/css) so the browser interprets files correctly.
    include /etc/nginx/mime.types;

    # Fallback MIME type for any extension not found in mime.types.
    # "application/octet-stream" forces a download rather than a guess.
    default_type application/octet-stream;

    # Where to log every HTTP request (IP, URL, status code, etc.).
    access_log /var/log/nginx/access.log;

    # Where to log nginx errors (config errors, upstream failures, etc.).
    error_log /var/log/nginx/error.log;

    # Hides the nginx version number in error pages and the
    # "Server" response header, reducing information leakage to attackers.
    server_tokens off;

    # Enables gzip compression of responses to reduce bandwidth
    # and speed up page loads.
    gzip on;

    # Which content types are eligible for gzip compression.
    # Binary formats (images, fonts) are excluded since they're
    # already compressed and gzip would waste CPU for no gain.
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Don't bother compressing responses smaller than this
    # (compression overhead isn't worth it for tiny files).
    gzip_min_length 256;

    # Maximum allowed size of a client request body (e.g. file uploads
    # via the WordPress media library). Requests larger than this
    # get rejected with HTTP 413 before reaching PHP.
    client_max_body_size 64m;

    # Shared memory zone (10 MB) nginx uses to cache TLS sessions,
    # so returning visitors can resume a session instead of doing
    # a full TLS handshake again (faster reconnects).
    ssl_session_cache shared:SSL:10m;

    # How long a cached TLS session stays valid before requiring
    # a fresh handshake.
    ssl_session_timeout 10m;

    # ---------------------------------------------------------
    # Main HTTPS server block: serves the actual WordPress site.
    # ---------------------------------------------------------
    server {
        # Listen for HTTPS traffic on the templated port, over IPv4 and IPv6,
        # with HTTP/2 enabled for faster multiplexed connections.
        listen __NGINX_PORT__ ssl http2;
        listen [::]:__NGINX_PORT__ ssl http2;

        server_name __DOMAIN_NAME__;

        # Prevents nginx from turning internal redirects into
        # full absolute URLs (keeps them relative). Useful when
        # nginx sits behind another reverse proxy or path prefix.
        absolute_redirect off;

        # Path to the TLS certificate (public cert + intermediate chain)
        # issued by Let's Encrypt for this specific domain.
        ssl_certificate /etc/nginx/ssl/__DOMAIN_NAME__/fullchain.pem;

        # Path to the matching private key for the certificate above.
        ssl_certificate_key /etc/nginx/ssl/__DOMAIN_NAME__/privkey.pem;

        # Only allow modern, secure TLS versions
        # (TLS 1.0/1.1 are deprecated and insecure).
        ssl_protocols TLSv1.2 TLSv1.3;

        # Tells nginx (not the client) to choose the cipher suite,
        # ensuring the strongest supported cipher is used.
        ssl_prefer_server_ciphers on;

        # Forces browsers to always use HTTPS for this domain (and
        # subdomains) for 1 year, even if the user types "http://".
        # Protects against SSL-stripping attacks.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Stops browsers from "sniffing" a file's content type,
        # forcing them to respect the declared Content-Type header
        # (mitigates certain XSS/MIME-confusion attacks).
        add_header X-Content-Type-Options "nosniff" always;

        # Prevents the site from being embedded in an <iframe> on
        # another domain, protecting against clickjacking.
        add_header X-Frame-Options "SAMEORIGIN" always;

        # Controls how much referrer information is sent to other
        # sites when users click outbound links (privacy hardening).
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Filesystem directory nginx serves files from.
        root /var/www/html;

        # Default files to look for when a directory is requested.
        index index.php index.html index.htm;

        # Handles all regular (non-PHP) requests.
        location / {
            # Try to serve the exact file, then the exact directory,
            # and if neither exists, hand off to WordPress's front
            # controller (index.php) so its routing/permalinks work.
            try_files $uri $uri/ /index.php?$args;
        }

        # Handles any request ending in .php.
        location ~ \.php$ {
            # Only pass the request to PHP-FPM if the .php file
            # actually exists on disk; otherwise return 404
            # (blocks attempts to execute arbitrary PHP paths).
            try_files $uri =404;

            # Forwards the request to the PHP-FPM service named
            # "wordpress" on the templated port (via FastCGI protocol).
            fastcgi_pass wordpress:__WORDPRESS_PORT__;

            # Default script nginx asks PHP-FPM to run if none specified.
            fastcgi_index index.php;

            # Loads nginx's standard set of FastCGI parameters
            # (REQUEST_METHOD, QUERY_STRING, etc.).
            include fastcgi_params;

            # Explicitly passes the original Host header to PHP,
            # so WordPress builds correct URLs even behind a proxy.
            fastcgi_param HTTP_HOST $http_host;

            # Tells PHP-FPM the absolute filesystem path of the
            # script to execute.
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

            # Tells WordPress/PHP the original connection was HTTPS,
            # even though nginx talks to PHP-FPM over plain HTTP
            # internally. Prevents mixed-content and redirect-loop issues.
            fastcgi_param HTTPS on;

            # Extends the timeout for long-running PHP operations
            # (large imports, plugin/theme updates, etc.) beyond
            # nginx's default 60 seconds.
            fastcgi_read_timeout 300;
        }

        # Blocks execution of any PHP file inside the uploads folder.
        # Uploads should only ever contain media, so this stops
        # uploaded "shell" scripts from being run if smuggled in.
        location ~* /wp-content/uploads/.*\.php$ {
            deny all;
        }

        # Blocks access to any hidden file/directory (starting with a dot),
        # e.g. .htaccess, .git, .env — prevents leaking sensitive files.
        location ~ /\. {
            deny all;
        }

        # Serves common static asset types with long-lived caching,
        # reducing repeat requests and speeding up page loads for
        # returning visitors.
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
            # Tells browsers/CDNs to cache the file for 30 days.
            expires 30d;

            # Reinforces the caching policy and disables any
            # on-the-fly transformation by intermediate proxies.
            add_header Cache-Control "public, no-transform";

            # Serve the file directly if present, else 404
            # (skips routing it through WordPress unnecessarily).
            try_files $uri =404;
        }

        # Special-cases favicon requests so missing-favicon errors
        # don't clutter the logs.
        location = /favicon.ico {
            log_not_found off;
            access_log off;
        }
    }

    # ---------------------------------------------------------
    # Plain HTTP server block: exists only to redirect everything
    # to HTTPS, since the site should never be served unencrypted.
    # ---------------------------------------------------------
    server {
        listen 80;

        listen [::]:80;

        server_name __DOMAIN_NAME__;

        return 301 https://$host$request_uri;
    }
}